name: Daily Prayer Sender

on:
  schedule:
    # 09:00 UTC = 11:00 AM Israel Winter Time (UTC+2)
    # In summer (IDT, UTC+3) this runs at 12:00 noon Israel time
    # Days: Sun–Thu = 0,1,2,3,4
    - cron: '0 9 * * 0,1,2,3,4'

  # Allow manual trigger from GitHub Actions UI for testing
  workflow_dispatch:

jobs:
  send-daily-prayer:
    name: Send daily prayer
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Send daily prayer
        env:
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_APP_PASSWORD: ${{ secrets.EMAIL_APP_PASSWORD }}
          DEFAULT_RECIPIENT: ${{ secrets.DEFAULT_RECIPIENT }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          DATA_MODE: database
        run: python scripts/daily_prayer_cron.py
